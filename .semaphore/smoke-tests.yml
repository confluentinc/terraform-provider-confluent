version: v1.0
name: Smoke Tests for Confluent Provider
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-2

auto_cancel:
  running:
    when: "false"

global_job_config:
  prologue:
    commands:
      - sem-version go 1.24.9
      - export "GOPATH=$(go env GOPATH)"
      - >-
        export
        "SEMAPHORE_GIT_DIR=${GOPATH}/src/github.com/confluentinc/${SEMAPHORE_PROJECT_NAME}"
      - 'export "PATH=${GOPATH}/bin:${PATH}"'
      - 'mkdir -vp "${SEMAPHORE_GIT_DIR}" "${GOPATH}/bin"'
      - checkout

execution_time_limit:
  minutes: 30

blocks:
  - name: "Smoke Tests"
    task:
      jobs:
        - name: "Run Smoke Tests"
          commands:
            # 1. Fetch secrets
            - . vault-sem-get-secret v1/ci/kv/apif/terraform-provider-confluent/live-testing-data
            - . vault-sem-get-secret v1/ci/kv/apif/terraform-provider-confluent/slack-notifications-live-testing

            # 2. Build OTLP metric reporter
            - go mod vendor
            - make build-otel-smoke-metric

            # 3. Run smoke tests
            - |
              echo "Running smoke tests..."
              make live-test-smoke && echo "PASS" > /tmp/smoke-result || echo "FAIL" > /tmp/smoke-result

            # 4. Report result via OTLP + notify on failure
            - |
              SMOKE_RESULT=$(cat /tmp/smoke-result 2>/dev/null || echo "FAIL")
              if [ "$SMOKE_RESULT" = "PASS" ]; then
                RESULT=1
              else
                RESULT=0
                echo "Smoke tests failed, sending Slack notification..."
                curl -X POST -H "Content-type: application/json" --data "{}" "$SLACK_WEBHOOK_URL"
              fi

              # Debug: discover available OIDC/auth mechanisms
              echo "[otel-debug] Looking for OIDC tools..."
              which semaphore-oidc-token 2>&1 || true
              ls /opt/semaphore/agent/bin/ 2>&1 || true
              ls /opt/confluent/semaphore/lib/ 2>&1 || true
              echo "[otel-debug] OIDC-related env vars:"
              env | grep -iE 'oidc|otlp|otel|token' 2>&1 || echo "(none)"
              echo "[otel-debug] Checking post_job.py for auth clues..."
              grep -i 'auth\|token\|header\|oidc\|bearer' /opt/confluent/semaphore/lib/post_job.py 2>&1 | head -20 || true

              echo "[otel-debug] Obtaining OIDC token..."
              SEMAPHORE_OIDC_TOKEN=$(semaphore-oidc-token --audience otlp.telemetry.confluent.cloud 2>&1) && \
                echo "[otel-debug] OIDC token obtained (length=${#SEMAPHORE_OIDC_TOKEN})" || \
                echo "[otel-debug] OIDC token failed: $SEMAPHORE_OIDC_TOKEN"
              export SEMAPHORE_OIDC_TOKEN

              echo "[otel-debug] Sending metric RESULT=$RESULT to otlp.telemetry.confluent.cloud:4317"
              echo "[otel-debug] SEMAPHORE_GIT_BRANCH=$SEMAPHORE_GIT_BRANCH SEMAPHORE_JOB_ID=$SEMAPHORE_JOB_ID"
              OTEL_OUTPUT=$(./bin/otel-smoke-metric "$RESULT" 2>&1) || true
              echo "[otel-debug] otel-smoke-metric output: $OTEL_OUTPUT"

              # Fail the job if tests failed
              [ "$SMOKE_RESULT" = "PASS" ]
